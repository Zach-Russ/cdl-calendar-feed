name: Update CDL Calendar

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout with write permission
      - uses: actions/checkout@v3
        with:
          persist-credentials: true  # <-- This allows git push

      # Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependencies
      - run: pip install -r requirements.txt

      # Run script
      - run: python generate_calendar.py

      # Commit and push only if changes
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cdl.ics
          git diff --quiet --cached || git commit -m "Update calendar"
          git push
