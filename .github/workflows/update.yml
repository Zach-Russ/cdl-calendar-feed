name: Update CDL Calendar

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3

      # Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependencies
      - run: pip install -r requirements.txt

      # Generate the calendar
      - run: python generate_calendar.py

      # Deploy to gh-pages using GitHub Pages action
      - name: Deploy cdl.ics to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./  # root contains cdl.ics
          allow_empty_commit: true
