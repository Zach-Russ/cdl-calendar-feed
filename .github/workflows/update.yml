name: Update CDL Calendar

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v3

      # Step 2: Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install dependencies
      - run: pip install -r requirements.txt

      # Step 4: Run Python script to generate cdl.ics
      - run: python generate_calendar.py

      # Step 5: Deploy to gh-pages using the Pages action (no manual git push)
      - name: Deploy cdl.ics to GitHub Pages
        uses: actions/deploy-pages@v1
        with:
          branch: gh-pages       # Branch to deploy to
          folder: ./             # Root folder contains cdl.ics
