name: Update CDL Calendar

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  pages: write       # required for GitHub Pages deployment
  id-token: write    # required by deploy-pages action

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repository contents
      - uses: actions/checkout@v3

      # 2) Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3) Install dependencies
      - run: pip install -r requirements.txt

      # 4) Run Python to generate the calendar file
      - run: python generate_calendar.py

      # 5) Upload the file (as Pages artifact)
      - name: Upload cdl.ics for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./cdl.ics

      # 6) Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
